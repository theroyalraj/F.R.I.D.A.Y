<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Friday · Voice</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── THEME VARIABLES ──────────────────────────────────────── */
    :root {
      --bg0: #03050e;
      --bg1: #080c1a;
      --glass: rgba(8, 14, 36, 0.62);
      --glass-hi: rgba(255, 255, 255, 0.04);
      --stroke: rgba(90, 150, 255, 0.16);
      --text: #deeaff;
      --muted: rgba(180, 210, 255, 0.42);
      --cyan: #38d9ff;
      --violet: #a78bfa;
      --pink: #f472b6;
      --amber: #fbbf24;
      --danger: #f87171;
      --shadow: 0 8px 40px rgba(0,0,0,0.55), 0 0 0 1px var(--glass-hi) inset;
      --orb-idle:   rgba(80,140,255,0.14);
      --orb-listen: rgba(56,217,255,0.38);
      --orb-think:  rgba(251,191,36,0.28);
      --orb-speak:  rgba(244,114,182,0.38);
    }
    body.light {
      --bg0: #edf2ff;
      --bg1: #e2eaff;
      --glass: rgba(255, 255, 255, 0.68);
      --glass-hi: rgba(255,255,255,0.9);
      --stroke: rgba(70, 120, 220, 0.20);
      --text: #0c1b3e;
      --muted: rgba(20,50,130,0.46);
      --cyan: #0369a1;
      --violet: #6d28d9;
      --pink: #be185d;
      --amber: #b45309;
      --danger: #b91c1c;
      --shadow: 0 8px 40px rgba(30,60,180,0.10), 0 0 0 1px rgba(255,255,255,0.8) inset;
      --orb-idle:   rgba(50,100,220,0.10);
      --orb-listen: rgba(3,105,161,0.22);
      --orb-think:  rgba(180,83,9,0.18);
      --orb-speak:  rgba(190,24,93,0.20);
    }

    /* ── BASE ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg0);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 0.35s, color 0.35s;
    }

    /* ── AURORA BACKGROUND ───────────────────────────────────── */
    .aurora {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .aurora-blob {
      position: absolute; border-radius: 50%;
      filter: blur(96px); pointer-events: none;
    }
    .aurora-blob-1 {
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(99,102,241,0.18) 0%, transparent 68%);
      top: -18%; left: -12%;
      animation: aurora-drift-a 22s ease-in-out infinite alternate;
    }
    .aurora-blob-2 {
      width: 550px; height: 550px;
      background: radial-gradient(ellipse, rgba(56,189,248,0.14) 0%, transparent 65%);
      bottom: -15%; right: -8%;
      animation: aurora-drift-b 17s ease-in-out infinite alternate;
    }
    .aurora-blob-3 {
      width: 420px; height: 320px;
      background: radial-gradient(ellipse, rgba(167,139,250,0.12) 0%, transparent 68%);
      top: 28%; right: 8%;
      animation: aurora-drift-a 25s ease-in-out infinite alternate;
      animation-delay: -7s;
    }
    .aurora-blob-4 {
      width: 360px; height: 260px;
      background: radial-gradient(ellipse, rgba(244,114,182,0.10) 0%, transparent 68%);
      bottom: 22%; left: 4%;
      animation: aurora-drift-b 20s ease-in-out infinite alternate;
      animation-delay: -4s;
    }
    .aurora-blob-5 {
      width: 300px; height: 300px;
      background: radial-gradient(ellipse, rgba(52,211,153,0.08) 0%, transparent 68%);
      top: 55%; left: 38%;
      animation: aurora-drift-a 30s ease-in-out infinite alternate;
      animation-delay: -12s;
    }
    @keyframes aurora-drift-a {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(45px,-35px) scale(1.1); }
    }
    @keyframes aurora-drift-b {
      from { transform: translate(0,0) scale(0.95); }
      to   { transform: translate(-30px,28px) scale(1.06); }
    }

    /* ── GRID OVERLAY ────────────────────────────────────────── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(80,140,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,140,255,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse 70% 65% at 50% 50%, black 10%, transparent 70%);
      pointer-events: none;
    }

    /* ── THEME TOGGLE ────────────────────────────────────────── */
    .theme-toggle {
      position: fixed; top: 0.9rem; right: 0.9rem; z-index: 200;
      height: 2rem; padding: 0 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--muted);
      font-family: inherit; font-size: 0.65rem;
      font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; cursor: pointer;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .theme-toggle:hover {
      border-color: var(--cyan); color: var(--cyan);
      box-shadow: 0 0 18px rgba(56,217,255,0.12);
    }

    /* ── LAYOUT ──────────────────────────────────────────────── */
    .wrap {
      position: relative; z-index: 1;
      min-height: 100%;
      display: flex; flex-direction: column; align-items: center;
      padding: clamp(1.25rem,4vw,2.5rem);
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
      gap: 1.1rem;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    header {
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
      gap: 0.45rem;
    }
    .friday-title {
      font-size: clamp(1.5rem,5vw,2.2rem);
      font-weight: 700; letter-spacing: 0.55em;
      text-transform: uppercase; margin: 0;
      background: linear-gradient(120deg,var(--cyan) 0%,var(--violet) 50%,var(--pink) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: title-pan 7s linear infinite;
    }
    @keyframes title-pan {
      from { background-position: 0% center; }
      to   { background-position: 200% center; }
    }
    .subtitle {
      font-size: 0.77rem; color: var(--muted);
      max-width: 24rem; line-height: 1.55; margin: 0;
    }
    .tts-hint {
      font-size: 0.66rem; color: var(--muted); font-style: italic; margin: 0;
    }
    .bar-row {
      display: flex; align-items: center; justify-content: center;
      gap: 0.55rem; flex-wrap: wrap;
    }
    .bar-label {
      font-size: 0.62rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      white-space: nowrap;
    }
    .glass-select {
      border-radius: 999px; border: 1px solid var(--stroke);
      background: var(--glass); backdrop-filter: blur(8px);
      color: var(--text); padding: 0.42rem 0.85rem;
      font-family: inherit; font-size: 0.75rem; cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s; min-width: 11rem;
    }
    .glass-select:hover { border-color: var(--cyan); box-shadow: 0 0 14px rgba(56,217,255,0.10); }
    .glass-select option { background: var(--bg1); color: var(--text); }

    /* ── SESSION VOICE BADGE ─────────────────────────────────── */
    .sv-badge {
      display: inline-flex; align-items: center; gap: 0.38rem;
      padding: 0.28rem 0.75rem; border-radius: 999px;
      border: 1px solid var(--stroke); background: var(--glass);
      backdrop-filter: blur(8px); font-size: 0.7rem; color: var(--text);
    }
    .sv-badge[data-gender="male"]   { border-color: rgba(56,217,255,0.38); }
    .sv-badge[data-gender="female"] { border-color: rgba(244,114,182,0.32); }
    .sv-reroll {
      background: none; border: none; cursor: pointer;
      font-size: 0.88rem; opacity: 0.6; padding: 0; line-height: 1;
      color: var(--text); transition: opacity 0.2s, transform 0.3s;
    }
    .sv-reroll:hover { opacity: 1; transform: rotate(180deg); }

    /* ── STAGE ───────────────────────────────────────────────── */
    .stage {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.95rem; width: 100%; max-width: 30rem;
    }

    /* ── VOICE ORB ───────────────────────────────────────────── */
    .orb-scene {
      position: relative;
      width: min(54vw, 224px); height: min(54vw, 224px);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    /* ambient glow */
    .orb-glow {
      position: absolute; inset: -32%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--orb-idle) 0%, transparent 64%);
      transition: background 0.7s ease; pointer-events: none;
    }
    .orb-scene[data-state="listening"] .orb-glow { background: radial-gradient(circle, var(--orb-listen) 0%, transparent 64%); }
    .orb-scene[data-state="thinking"]  .orb-glow { background: radial-gradient(circle, var(--orb-think) 0%, transparent 64%); }
    .orb-scene[data-state="speaking"]  .orb-glow { background: radial-gradient(circle, var(--orb-speak) 0%, transparent 64%); }
    /* outer ring */
    .orb-ring-outer {
      position: absolute; inset: -10%; border-radius: 50%;
      border: 1px solid rgba(100,160,255,0.16); pointer-events: none;
    }
    /* inner ring */
    .orb-ring-inner {
      position: absolute; inset: -4%; border-radius: 50%;
      border: 1px solid rgba(100,160,255,0.10); pointer-events: none;
    }
    /* ripple rings (speaking) */
    .ripple-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1.5px solid var(--pink); opacity: 0; pointer-events: none;
    }
    body.light .ripple-ring { border-color: var(--pink); }
    /* orbit track (thinking) */
    .orbit-track {
      position: absolute; inset: -22%; border-radius: 50%;
      border: 1px dashed rgba(251,191,36,0.16);
      opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
    }
    .orb-scene[data-state="thinking"] .orbit-track { opacity: 1; }
    .orbit-dot {
      position: absolute; top: 50%; left: 50%;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 10px rgba(251,191,36,0.9);
      pointer-events: none;
    }
    /* core sphere */
    .orb-core {
      position: absolute; inset: 0; border-radius: 50%; z-index: 2;
      background:
        radial-gradient(circle at 30% 27%, rgba(255,255,255,0.22) 0%, transparent 44%),
        radial-gradient(circle at 68% 72%, var(--violet) 0%, transparent 42%),
        radial-gradient(circle at 50% 50%, rgba(56,217,255,0.22), var(--bg1));
      box-shadow:
        0 0 70px rgba(56,217,255,0.14),
        0 0 140px rgba(100,80,220,0.10),
        inset 0 0 55px rgba(56,217,255,0.06);
      transition: box-shadow 0.55s ease;
      overflow: hidden;
    }
    .orb-core::after {
      content: '';
      position: absolute; top: 9%; left: 19%;
      width: 36%; height: 26%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.18) 0%, transparent 70%);
      border-radius: 50%;
    }
    .orb-scene[data-state="listening"] .orb-core {
      box-shadow: 0 0 90px rgba(56,217,255,0.32), 0 0 170px rgba(56,217,255,0.14), inset 0 0 65px rgba(56,217,255,0.12);
    }
    .orb-scene[data-state="thinking"] .orb-core {
      box-shadow: 0 0 80px rgba(251,191,36,0.26), 0 0 160px rgba(251,191,36,0.10), inset 0 0 55px rgba(251,191,36,0.12);
    }
    .orb-scene[data-state="speaking"] .orb-core {
      box-shadow: 0 0 95px rgba(244,114,182,0.38), 0 0 180px rgba(244,114,182,0.16), inset 0 0 65px rgba(244,114,182,0.14);
    }
    /* waveform bars (listening) */
    .wave-bars {
      position: absolute; bottom: -30px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 3px;
      opacity: 0; transition: opacity 0.3s ease;
      pointer-events: none; z-index: 5;
    }
    .orb-scene[data-state="listening"] .wave-bars { opacity: 1; }
    .wave-bar {
      width: 3px; height: 18px; border-radius: 3px;
      background: var(--cyan); transform-origin: center bottom;
      box-shadow: 0 0 7px rgba(56,217,255,0.55);
    }
    /* stop button */
    .orb-stop {
      position: absolute; top: 50%; left: 50%; z-index: 10;
      transform: translate(-50%,-50%);
      width: 3rem; height: 3rem; border-radius: 50%;
      border: 2px solid rgba(248,113,113,0.38);
      background: rgba(5,8,22,0.78); backdrop-filter: blur(10px);
      color: var(--danger); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0; opacity: 0; pointer-events: none;
      transition: opacity 0.25s, border-color 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    body.light .orb-stop { background: rgba(255,255,255,0.88); }
    .orb-stop:hover { border-color: var(--danger); box-shadow: 0 0 20px rgba(248,113,113,0.24); }
    .orb-stop-icon { width: 0.78rem; height: 0.78rem; border-radius: 2px; background: currentColor; }
    .orb-scene[data-state="listening"] .orb-stop,
    .orb-scene[data-state="thinking"]  .orb-stop,
    .orb-scene[data-state="speaking"]  .orb-stop {
      opacity: 1; pointer-events: auto;
    }
    .orb-scene[data-state="listening"] .orb-stop { border-color: rgba(56,217,255,0.50); color: var(--cyan); }
    .orb-scene[data-state="thinking"]  .orb-stop { border-color: rgba(251,191,36,0.50); color: var(--amber); }

    /* ── STATE LABEL ─────────────────────────────────────────── */
    .state-label {
      font-size: 0.68rem; letter-spacing: 0.3em;
      text-transform: uppercase; font-weight: 600;
      color: var(--muted); min-height: 1.1em;
      transition: color 0.4s;
    }
    .state-label[data-state="listening"] { color: var(--cyan); }
    .state-label[data-state="thinking"]  { color: var(--amber); }
    .state-label[data-state="speaking"]  { color: var(--pink); }

    /* ── HINT TEXT ───────────────────────────────────────────── */
    .hint-text {
      font-size: 0.74rem; color: var(--muted); text-align: center;
      max-width: 22rem; line-height: 1.55; min-height: 2.2em; margin: 0;
      transition: color 0.3s;
    }

    /* ── CHAT HISTORY ────────────────────────────────────────── */
    .chat-history {
      width: 100%; max-height: min(30vh, 210px);
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 0.5rem;
      padding: 0 0.15rem;
      scrollbar-width: thin; scrollbar-color: var(--stroke) transparent;
    }
    .msg-bubble {
      padding: 0.58rem 0.9rem; border-radius: 14px;
      font-size: 0.82rem; line-height: 1.5;
      border: 1px solid var(--stroke);
      backdrop-filter: blur(14px);
    }
    .msg-bubble.you {
      align-self: flex-end; max-width: 90%;
      background: rgba(56,217,255,0.07); border-color: rgba(56,217,255,0.22);
      color: var(--cyan);
    }
    body.light .msg-bubble.you { background: rgba(3,105,161,0.07); }
    .msg-bubble.agent {
      align-self: flex-start; max-width: 95%;
      background: var(--glass); color: var(--text);
    }
    .msg-tag {
      font-size: 0.59rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 0.3rem; font-weight: 600;
    }
    .msg-text { white-space: pre-wrap; word-break: break-word; }

    /* ── CONTROL BUTTONS ─────────────────────────────────────── */
    .control-row {
      display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center;
    }
    .ctrl-btn {
      font-family: inherit; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.65rem 1.2rem; border-radius: 999px;
      border: 1px solid var(--stroke);
      background: var(--glass); backdrop-filter: blur(8px);
      color: var(--text); cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover:not(:disabled) {
      border-color: rgba(100,160,255,0.38);
      box-shadow: 0 0 22px rgba(56,217,255,0.09);
      transform: translateY(-1px);
    }
    .ctrl-btn:active:not(:disabled) { transform: scale(0.96) translateY(0); }
    .ctrl-btn:disabled { opacity: 0.34; cursor: not-allowed; }
    .ctrl-btn.primary {
      background: linear-gradient(135deg,rgba(56,217,255,0.16),rgba(167,139,250,0.14));
      border-color: rgba(56,217,255,0.32);
    }
    .ctrl-btn.primary:hover:not(:disabled) {
      border-color: var(--cyan); box-shadow: 0 0 26px rgba(56,217,255,0.18);
    }
    .ctrl-btn.amber { border-color: rgba(251,191,36,0.35); color: var(--amber); }
    .ctrl-btn.amber:hover:not(:disabled) { border-color: var(--amber); box-shadow: 0 0 22px rgba(251,191,36,0.15); }
    .ctrl-btn.danger { border-color: rgba(248,113,113,0.32); color: var(--danger); }
    .ctrl-btn.danger:hover:not(:disabled) { border-color: var(--danger); box-shadow: 0 0 22px rgba(248,113,113,0.14); }

    /* ── SETTINGS PANEL ──────────────────────────────────────── */
    .settings-panel {
      width: 100%; max-width: 30rem;
      border-radius: 16px; border: 1px solid var(--stroke);
      background: var(--glass); backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .settings-toggle-btn {
      width: 100%; padding: 0.7rem 1rem;
      background: none; border: none; cursor: pointer;
      text-align: left; font-family: inherit;
      font-size: 0.67rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; justify-content: space-between;
      transition: color 0.2s;
    }
    .settings-toggle-btn:hover { color: var(--text); }
    .settings-arrow { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); font-size: 0.6rem; }
    .settings-arrow.open { transform: rotate(180deg); }
    .settings-body {
      overflow: hidden; max-height: 0;
      transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1);
    }
    .settings-body.open { max-height: 420px; }
    .settings-inner {
      padding: 0 1rem 1rem;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .field-label {
      font-size: 0.62rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); font-weight: 500;
    }
    .glass-textarea {
      width: 100%; min-height: 3.5rem; resize: vertical;
      border-radius: 10px; border: 1px solid var(--stroke);
      background: rgba(0,0,0,0.28); color: var(--text);
      padding: 0.55rem 0.75rem; font-family: inherit;
      font-size: 0.82rem; line-height: 1.5;
      transition: border-color 0.2s;
    }
    body.light .glass-textarea { background: rgba(255,255,255,0.6); }
    .glass-textarea:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(56,217,255,0.10); }
    .range-row { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    input[type="range"] { accent-color: var(--cyan); width: 88px; }
    .glass-select.sq { border-radius: 9px; flex: 1; min-width: 10rem; }
    .voice-info {
      font-size: 0.63rem; color: var(--muted); font-style: italic; min-height: 1em;
    }

    /* ── TODOS PANEL ─────────────────────────────────────────── */
    .todos-panel {
      width: 100%; max-width: 30rem;
      border-radius: 16px; border: 1px solid var(--stroke);
      background: var(--glass); backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .todos-body { overflow: hidden; max-height: 0; transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1); }
    .todos-body.open { max-height: 700px; }
    .todos-inner { padding: 0 1rem 1rem; display: flex; flex-direction: column; gap: 0.55rem; }
    .todo-add-row {
      display: flex; gap: 0.4rem;
    }
    .todo-input {
      flex: 1; border-radius: 9px; border: 1px solid var(--stroke);
      background: rgba(0,0,0,0.28); color: var(--text);
      padding: 0.42rem 0.72rem; font-family: inherit; font-size: 0.82rem;
      transition: border-color 0.2s;
    }
    body.light .todo-input { background: rgba(255,255,255,0.6); }
    .todo-input:focus { outline: none; border-color: var(--cyan); }
    .todo-add-btn {
      border-radius: 9px; border: 1px solid var(--stroke);
      background: rgba(56,217,255,0.10); color: var(--cyan);
      padding: 0.42rem 0.82rem; font-family: inherit; font-size: 0.8rem;
      cursor: pointer; font-weight: 600; transition: background 0.2s;
    }
    .todo-add-btn:hover { background: rgba(56,217,255,0.22); }
    .todo-section-label {
      font-size: 0.58rem; letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--muted); font-weight: 600; margin-top: 0.3rem;
    }
    .todo-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.28rem; }
    .todo-item {
      display: flex; align-items: flex-start; gap: 0.55rem;
      padding: 0.5rem 0.65rem; border-radius: 10px;
      border: 1px solid var(--stroke); background: var(--glass-hi);
      transition: opacity 0.2s;
    }
    .todo-item.done { opacity: 0.42; }
    .todo-check {
      margin-top: 0.12rem; flex-shrink: 0;
      width: 1rem; height: 1rem; border-radius: 4px;
      border: 1.5px solid var(--muted); background: none;
      cursor: pointer; appearance: none; -webkit-appearance: none;
      position: relative; transition: background 0.15s, border-color 0.15s;
    }
    .todo-check:checked { background: var(--cyan); border-color: var(--cyan); }
    .todo-check:checked::after {
      content: ''; position: absolute; left: 2px; top: -1px;
      width: 5px; height: 9px; border: 2px solid #0a0f1e;
      border-top: none; border-left: none; transform: rotate(45deg);
    }
    .todo-text { flex: 1; font-size: 0.82rem; line-height: 1.4; color: var(--text); }
    .todo-detail { font-size: 0.7rem; color: var(--muted); margin-top: 0.12rem; }
    .todo-source { font-size: 0.6rem; color: var(--muted); font-style: italic; }
    .todo-priority {
      font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase;
      font-weight: 700; border-radius: 4px; padding: 0 0.32rem;
      line-height: 1.6; flex-shrink: 0; margin-top: 0.12rem;
    }
    .prio-high   { background: rgba(248,113,113,0.18); color: var(--danger); }
    .prio-medium { background: rgba(251,191,36,0.15);  color: var(--amber); }
    .prio-low    { background: rgba(56,217,255,0.10);  color: var(--cyan); }
    .todo-del {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.8rem; padding: 0 0.1rem;
      line-height: 1; transition: color 0.15s;
    }
    .todo-del:hover { color: var(--danger); }
    .reminder-item {
      display: flex; align-items: flex-start; gap: 0.55rem;
      padding: 0.5rem 0.65rem; border-radius: 10px;
      border: 1px solid rgba(167,139,250,0.25); background: rgba(167,139,250,0.06);
    }
    .reminder-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 0.05rem; }
    .reminder-body { flex: 1; }
    .reminder-title { font-size: 0.82rem; color: var(--text); }
    .reminder-due   { font-size: 0.67rem; color: var(--violet); margin-top: 0.1rem; }
    .reminder-del {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.8rem; padding: 0 0.1rem;
      transition: color 0.15s;
    }
    .reminder-del:hover { color: var(--danger); }
    .todos-empty { font-size: 0.74rem; color: var(--muted); text-align: center; padding: 0.5rem 0; }
    .todos-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.1rem; height: 1.1rem; border-radius: 999px;
      background: rgba(56,217,255,0.18); color: var(--cyan);
      font-size: 0.58rem; font-weight: 700; padding: 0 0.3rem;
      margin-left: 0.4rem; vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="root"><p class="boot-hint" style="padding:2rem;text-align:center;color:#64748b;font-family:system-ui">Loading Friday…</p></div>

  <!-- anime.js 3 global (must load before the module runs) -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

  <!--
    No import map: bare "react" + "htm" from esm.sh often pull *two* copies of React → invalid hook call → blank page.
    Pin one React and pass ?deps= so react-dom and htm share it.
  -->
  <script type="module">
  import {
    createElement as h, useState, useEffect, useRef, useLayoutEffect
  } from 'https://esm.sh/react@18.2.0';
  import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0';
  import htm from 'https://esm.sh/htm@3.1.1?deps=react@18.2.0';

  const html = htm.bind(h);
  const anime = typeof window.anime === 'function'
    ? window.anime.bind(window)
    : () => ({ pause() {}, restart() {}, remove() {} });

  /* ── constants ──────────────────────────────────────────────── */
  const API     = p => new URL(p, location.origin).href;
  const THEADERS = { 'ngrok-skip-browser-warning': '69420', Accept: 'application/json' };
  /** Injected by pc-agent when serving /friday if PC_AGENT_SECRET is set — same Bearer daemons use. */
  function voiceAuthHeaders() {
    try {
      const t = typeof window !== 'undefined' && window.__OPENCLAW_PC_AGENT_BEARER__;
      if (t && String(t).trim()) return { Authorization: `Bearer ${String(t).trim()}` };
    } catch {}
    return {};
  }
  const VOICE_HEADERS = () => ({ ...THEADERS, ...voiceAuthHeaders() });
  const SR      = window.SpeechRecognition || window.webkitSpeechRecognition;

  const CHAT_VOICES = [
    { voice: 'en-US-EmmaMultilingualNeural',  gender: 'Female', label: 'Emma · US · Multilingual' },
    { voice: 'en-GB-LibbyNeural',             gender: 'Female', label: 'Libby · British' },
    { voice: 'en-GB-SoniaNeural',             gender: 'Female', label: 'Sonia · British' },
    { voice: 'en-US-GuyNeural',               gender: 'Male',   label: 'Guy · US' },
    { voice: 'en-US-ChristopherNeural',       gender: 'Male',   label: 'Christopher · US' },
    { voice: 'en-US-DavisNeural',             gender: 'Male',   label: 'Davis · US' },
    { voice: 'en-US-AriaNeural',              gender: 'Female', label: 'Aria · US' },
    { voice: 'en-US-JennyNeural',             gender: 'Female', label: 'Jenny · US' },
    { voice: 'en-US-NancyNeural',             gender: 'Female', label: 'Nancy · US' },
    { voice: 'en-IN-NeerjaExpressiveNeural',  gender: 'Female', label: 'Neerja · Indian' },
    { voice: 'en-IN-PrabhatNeural',           gender: 'Male',   label: 'Prabhat · Indian' },
    { voice: 'en-AU-NatashaNeural',           gender: 'Female', label: 'Natasha · Australian' },
    { voice: 'en-CA-LiamNeural',              gender: 'Male',   label: 'Liam · Canadian' },
    { voice: 'en-CA-ClaraNeural',             gender: 'Female', label: 'Clara · Canadian' },
  ];
  const SS_VOICE = 'friday.chat.voice';
  const LS_THEME = 'friday.theme';
  const LS_MODEL = 'friday.claudeModel';
  const LS_BV    = 'friday.browserVoice';

  function initChatVoice() {
    const stored = sessionStorage.getItem(SS_VOICE);
    const found  = stored && CHAT_VOICES.find(v => v.voice === stored);
    if (found) return found;
    const picked = CHAT_VOICES[Math.floor(Math.random() * CHAT_VOICES.length)];
    sessionStorage.setItem(SS_VOICE, picked.voice);
    return picked;
  }

  function pickBestVoice() {
    const v = speechSynthesis.getVoices();
    if (!v?.length) return null;
    const p = pred => v.find(pred);
    return (
      p(x => /Microsoft.*(Aria|Jenny|Guy|Davis|Zira|Andrew|Sonia|Libby|Emma|Brian|Christopher)/i.test(x.name) && /^en/i.test(x.lang)) ||
      p(x => /Google[™]?\s+.*(US English|UK English)/i.test(x.name)) ||
      p(x => /Samantha|Daniel|Karen|Moira|Fiona/i.test(x.name) && /^en/i.test(x.lang)) ||
      p(x => /(Neural|Natural|Premium)/i.test(x.name) && /^en/i.test(x.lang)) ||
      p(x => x.lang === 'en-US') || p(x => /^en/i.test(x.lang)) || v[0]
    );
  }

  function forSpeech(raw) {
    if (!raw || typeof raw !== 'string') return 'Done.';
    let t = raw.replace(/```[\s\S]*?```/g, ' ').replace(/`[^`]+`/g, ' ');
    t = t.replace(/\s+/g, ' ').trim();
    if (t.length > 3800) t = t.slice(0, 3800) + '…';
    return t || 'Done.';
  }

  /* ══════════════════════════════════════════════════════════
     MessageBubble — springs in with anime.js on mount
  ══════════════════════════════════════════════════════════ */
  function MessageBubble({ role, text }) {
    const ref = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      anime({
        targets: ref.current,
        opacity: [0, 1],
        translateY: [14, 0],
        scale: [0.96, 1],
        easing: 'cubicBezier(0.34, 1.56, 0.64, 1)',
        duration: 480,
      });
    }, []);
    return html`
      <div ref=${ref} className=${'msg-bubble ' + role} style=${{ opacity: 0 }}>
        <div className="msg-tag">${role === 'you' ? 'You' : 'Friday'}</div>
        <div className="msg-text">${text}</div>
      </div>
    `;
  }

  /* ══════════════════════════════════════════════════════════
     VoiceOrb — main animated orb with state-driven anime.js
  ══════════════════════════════════════════════════════════ */
  const N_WAVE    = 9;
  const N_RIPPLE  = 3;
  const N_DOTS    = 3;

  function VoiceOrb({ state, onOrbClick, onStop }) {
    const sceneRef = useRef(null);
    const coreRef  = useRef(null);
    const rOuter   = useRef(null);
    const rInner   = useRef(null);
    const waveBars = useRef(Array(N_WAVE).fill(null));
    const ripples  = useRef(Array(N_RIPPLE).fill(null));
    const dots     = useRef(Array(N_DOTS).fill(null));
    const anims    = useRef([]);

    useLayoutEffect(() => {
      anims.current.forEach(a => a?.pause?.());
      anims.current = [];
      if (!coreRef.current) return;

      const push = a => anims.current.push(a);

      if (state === 'idle') {
        push(anime({ targets: coreRef.current,  translateY: [-5,5], direction:'alternate', loop:true, easing:'easeInOutSine', duration:3200 }));
        push(anime({ targets: rOuter.current,   scale:[1,1.05,1],   opacity:[0.55,0.9,0.55], loop:true, easing:'easeInOutSine', duration:4200 }));
        push(anime({ targets: rInner.current,   scale:[1,1.03],     opacity:[0.45,0.75], direction:'alternate', loop:true, easing:'easeInOutSine', duration:5000, delay:600 }));

      } else if (state === 'listening') {
        push(anime({ targets: coreRef.current,  scale:[1,1.038,1], direction:'alternate', loop:true, easing:'easeInOutSine', duration:1900 }));
        push(anime({ targets: rOuter.current,   scale:[1,1.12,1],  opacity:[0.25,0.82,0.25], loop:true, easing:'easeInOutSine', duration:1750 }));
        push(anime({ targets: rInner.current,   scale:[1,1.16,1],  opacity:[0.18,0.55,0.18], loop:true, easing:'easeInOutSine', duration:2200, delay:280 }));
        /* wave bars */
        waveBars.current.forEach((bar, i) => {
          if (!bar) return;
          const anim = {
            targets: bar,
            scaleY: [
              { value: 0.18 + Math.random() * 0.2 },
              { value: 0.55 + Math.random() * 0.45 },
              { value: 0.18 + Math.random() * 0.2 },
            ],
            easing: 'easeInOutSine',
            duration: 280 + Math.random() * 380,
            delay: i * 58,
            loop: true,
          };
          push(anime(anim));
        });

      } else if (state === 'thinking') {
        push(anime({ targets: coreRef.current,  rotate: '4deg', direction:'alternate', loop:true, easing:'easeInOutSine', duration:2800 }));
        push(anime({ targets: rOuter.current,   rotate: '360deg', loop:true, easing:'linear', duration:4500 }));
        push(anime({ targets: rInner.current,   rotate: '-360deg', loop:true, easing:'linear', duration:6500 }));
        /* orbit dots */
        const sceneW = sceneRef.current?.offsetWidth || 224;
        const r      = sceneW / 2 * 1.24;
        dots.current.forEach((dot, i) => {
          if (!dot) return;
          const offset = (i / N_DOTS) * Math.PI * 2;
          const dur    = 2600 + i * 350;
          const a = anime({
            targets: dot, duration: dur, loop: true, easing: 'linear',
            update(anim) {
              const ang = offset + (anim.progress / 100) * Math.PI * 2;
              dot.style.transform =
                `translate(calc(-50% + ${(r * Math.cos(ang)).toFixed(2)}px), calc(-50% + ${(r * Math.sin(ang)).toFixed(2)}px))`;
            },
          });
          push(a);
        });

      } else if (state === 'speaking') {
        push(anime({ targets: coreRef.current,  scale:[1,1.026,1], direction:'alternate', loop:true, easing:'easeInOutSine', duration:490 }));
        push(anime({ targets: rOuter.current,   scale:[1,1.07,1],  opacity:[0.45,0.92,0.45], loop:true, easing:'easeInOutSine', duration:560 }));
        /* ripple rings */
        ripples.current.forEach((ring, i) => {
          if (!ring) return;
          push(anime({ targets: ring, scale:[1,2.5], opacity:[0.65,0], easing:'easeOutExpo', duration:1350, loop:true, delay: i * 440 }));
        });
      }

      return () => { anims.current.forEach(a => a?.pause?.()); };
    }, [state]);

    return html`
      <div ref=${sceneRef} className="orb-scene" data-state=${state}
        onClick=${e => { if (!e.target.closest('.orb-stop')) onOrbClick(); }}>

        <div className="orb-glow"></div>
        <div ref=${rOuter} className="orb-ring-outer"></div>
        <div ref=${rInner} className="orb-ring-inner"></div>

        ${ripples.current = []; Array.from({length: N_RIPPLE}).map((_, i) =>
          html`<div key=${i} className="ripple-ring" ref=${el => ripples.current[i] = el}></div>`
        )}

        <div className="orbit-track">
          ${dots.current = []; Array.from({length: N_DOTS}).map((_, i) =>
            html`<div key=${i} className="orbit-dot" ref=${el => dots.current[i] = el}></div>`
          )}
        </div>

        <div ref=${coreRef} className="orb-core"></div>

        <div className="wave-bars">
          ${waveBars.current = []; Array.from({length: N_WAVE}).map((_, i) =>
            html`<div key=${i} className="wave-bar" ref=${el => waveBars.current[i] = el}></div>`
          )}
        </div>

        <button type="button" className="orb-stop"
          onClick=${e => { e.stopPropagation(); onStop(); }}
          aria-label="Stop">
          <span className="orb-stop-icon" aria-hidden="true"></span>
        </button>
      </div>
    `;
  }

  /* ══════════════════════════════════════════════════════════
     TodosPanel — manages todos + reminders from /todos API
  ══════════════════════════════════════════════════════════ */
  function TodosPanel() {
    const [open, setOpen]         = useState(false);
    const [todos, setTodos]       = useState([]);
    const [reminders, setReminders] = useState([]);
    const [newTitle, setNewTitle] = useState('');
    const [loading, setLoading]   = useState(false);

    async function loadAll() {
      try {
        const [tr, rr] = await Promise.all([
          fetch(API('/todos?done=all'), { headers: THEADERS }),
          fetch(API('/todos/reminders'), { headers: THEADERS }),
        ]);
        const td = await tr.json(); if (td.ok) setTodos(td.todos);
        const rd = await rr.json(); if (rd.ok) setReminders(rd.reminders);
      } catch {}
    }

    useEffect(() => {
      loadAll();
      // Poll every 30s for live updates (SSE todo events come through broadcastEvent)
      const iv = setInterval(loadAll, 30_000);
      // Also listen on the SSE stream for instant UI updates
      let es;
      try {
        es = new EventSource(API('/voice/stream'));
        es.onmessage = (e) => {
          try {
            const ev = JSON.parse(e.data);
            if (['todo_added','todo_updated','todo_deleted','reminder_added','reminder_fired','reminder_deleted'].includes(ev.type)) {
              loadAll();
            }
          } catch {}
        };
      } catch {}
      return () => { clearInterval(iv); try { es?.close(); } catch {} };
    }, []);

    async function addTodo() {
      const t = newTitle.trim(); if (!t) return;
      setNewTitle(''); setLoading(true);
      try {
        const r = await fetch(API('/todos'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...THEADERS },
          body: JSON.stringify({ title: t, source: 'manual' }),
        });
        const d = await r.json();
        if (d.ok) setTodos(prev => [d.todo, ...prev]);
      } catch {}
      setLoading(false);
    }

    async function toggleDone(todo) {
      try {
        const r = await fetch(API('/todos/' + todo.id), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', ...THEADERS },
          body: JSON.stringify({ done: !todo.done }),
        });
        const d = await r.json();
        if (d.ok) setTodos(prev => prev.map(t => t.id === todo.id ? d.todo : t));
      } catch {}
    }

    async function deleteTodo(id) {
      try {
        await fetch(API('/todos/' + id), { method: 'DELETE', headers: THEADERS });
        setTodos(prev => prev.filter(t => t.id !== id));
      } catch {}
    }

    async function deleteReminder(id) {
      try {
        await fetch(API('/todos/reminders/' + id), { method: 'DELETE', headers: THEADERS });
        setReminders(prev => prev.filter(r => r.id !== id));
      } catch {}
    }

    const pendingTodos = todos.filter(t => !t.done);
    const doneTodos    = todos.filter(t => t.done);
    const badgeCount   = pendingTodos.length + reminders.length;

    function prioClass(p) {
      if (p === 'high')   return 'todo-priority prio-high';
      if (p === 'low')    return 'todo-priority prio-low';
      return 'todo-priority prio-medium';
    }

    function fmtDue(r) {
      if (r.dueIso) {
        try {
          const d = new Date(r.dueIso);
          return d.toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
        } catch {}
      }
      return r.dueNatural || '';
    }

    return html`
      <div className="todos-panel">
        <button type="button" className="settings-toggle-btn" onClick=${() => setOpen(o => !o)}>
          <span>
            Todos &amp; Reminders
            ${badgeCount > 0 ? html`<span className="todos-badge">${badgeCount}</span>` : null}
          </span>
          <span className=${'settings-arrow' + (open ? ' open' : '')}>▾</span>
        </button>
        <div className=${'todos-body' + (open ? ' open' : '')}>
          <div className="todos-inner">

            <!-- Quick add -->
            <div className="todo-add-row">
              <input
                type="text"
                className="todo-input"
                placeholder="Add a todo…"
                value=${newTitle}
                onChange=${e => setNewTitle(e.target.value)}
                onKeyDown=${e => { if (e.key === 'Enter') addTodo(); }}
              />
              <button className="todo-add-btn" disabled=${loading} onClick=${addTodo}>+ Add</button>
            </div>

            <!-- Reminders -->
            ${reminders.length > 0 ? html`
              <p className="todo-section-label">⏰ Reminders</p>
              <ul className="todo-list">
                ${reminders.map(r => html`
                  <li key=${r.id} className="reminder-item">
                    <span className="reminder-icon">🔔</span>
                    <div className="reminder-body">
                      <div className="reminder-title">${r.title}</div>
                      ${fmtDue(r) ? html`<div className="reminder-due">${fmtDue(r)}</div>` : null}
                    </div>
                    <button className="reminder-del" title="Dismiss" onClick=${() => deleteReminder(r.id)}>✕</button>
                  </li>
                `)}
              </ul>
            ` : null}

            <!-- Pending todos -->
            <p className="todo-section-label">📋 To Do${pendingTodos.length ? ` (${pendingTodos.length})` : ''}</p>
            ${pendingTodos.length === 0
              ? html`<p className="todos-empty">All clear — no pending todos.</p>`
              : html`<ul className="todo-list">
                ${pendingTodos.map(t => html`
                  <li key=${t.id} className="todo-item">
                    <input type="checkbox" className="todo-check" checked=${t.done} onChange=${() => toggleDone(t)} />
                    <div className="todo-text">
                      <div>${t.title}</div>
                      ${t.detail ? html`<div className="todo-detail">${t.detail}</div>` : null}
                      ${t.source && t.source !== 'manual' ? html`<div className="todo-source">${t.source}</div>` : null}
                    </div>
                    <span className=${prioClass(t.priority)}>${t.priority}</span>
                    <button className="todo-del" title="Delete" onClick=${() => deleteTodo(t.id)}>✕</button>
                  </li>
                `)}
              </ul>`
            }

            <!-- Done todos (collapsed) -->
            ${doneTodos.length > 0 ? html`
              <p className="todo-section-label">✓ Done (${doneTodos.length})</p>
              <ul className="todo-list">
                ${doneTodos.map(t => html`
                  <li key=${t.id} className=${'todo-item done'}>
                    <input type="checkbox" className="todo-check" checked=${true} onChange=${() => toggleDone(t)} />
                    <div className="todo-text"><div>${t.title}</div></div>
                    <button className="todo-del" title="Delete" onClick=${() => deleteTodo(t.id)}>✕</button>
                  </li>
                `)}
              </ul>
            ` : null}

          </div>
        </div>
      </div>
    `;
  }

  /* ══════════════════════════════════════════════════════════
     App — root component + all voice/session logic
  ══════════════════════════════════════════════════════════ */
  function App() {
    /* ── ui state ── */
    const [orbState, setOrbState_] = useState('idle');
    const [messages,  setMessages] = useState([]);
    const [hint, setHint]         = useState('Start a session to enable the microphone. Works best in Chrome or Edge.');
    const [active, setActive]     = useState(false);
    const [dark, setDark_]        = useState(() => { try { const t = localStorage.getItem(LS_THEME); return t ? t === 'dark' : true; } catch { return true; } });
    const [model, setModel_]      = useState(() => { try { return localStorage.getItem(LS_MODEL) || ''; } catch { return ''; } });
    const [chatVoice, setChatVoice] = useState(initChatVoice);
    const [svrVoices, setSvrVoices] = useState([]);
    const [svrActive, setSvrActive] = useState('');
    const [svrDesc,   setSvrDesc]   = useState('');
    const [showSvr,   setShowSvr]   = useState(false);
    const [bvList, setBvList]       = useState([]);
    const [bv,    setBv_]           = useState(() => { try { return localStorage.getItem(LS_BV) || ''; } catch { return ''; } });
    const [rate,  setRate]  = useState(1.075);
    const [pitch, setPitch] = useState(1.05);
    const [ttsHint, setTtsHint] = useState('');
    const [panelOpen, setPanelOpen] = useState(false);
    const [typed, setTyped] = useState('');

    /* ── mutable refs (no re-render needed) ── */
    const stateRef = useRef('idle');
    const busyRef  = useRef(false);
    const sessRef  = useRef(false);
    const recRef   = useRef(null);
    const bargeRef = useRef(null);
    const uidRef   = useRef(0);     // utterance gen id
    const audRef   = useRef(null);  // current audio element
    const abrtRef  = useRef(null);  // AbortController
    const lstnRef  = useRef(0);     // listen turn gen
    const msgIdRef = useRef(0);
    const openRouterPendingRef = useRef(false);
    const openRouterTimeoutRef = useRef(null);
    const bvRef    = useRef(bv);
    const rateRef  = useRef(rate);
    const pitchRef = useRef(pitch);
    const chatVRef = useRef(chatVoice);

    useEffect(() => { bvRef.current = bv; }, [bv]);
    useEffect(() => { rateRef.current = rate; }, [rate]);
    useEffect(() => { pitchRef.current = pitch; }, [pitch]);
    useEffect(() => { chatVRef.current = chatVoice; }, [chatVoice]);

    /* ── helpers ── */
    function setOrb(s) { stateRef.current = s; setOrbState_(s); }

    function setDark(v) {
      setDark_(v);
      document.body.classList.toggle('light', !v);
      try { localStorage.setItem(LS_THEME, v ? 'dark' : 'light'); } catch {}
    }
    function setModel(v) {
      setModel_(v);
      try { localStorage.setItem(LS_MODEL, v); } catch {}
    }
    function setBv(v) {
      setBv_(v);
      try { localStorage.setItem(LS_BV, v); } catch {}
    }

    /* ── apply initial theme ── */
    useEffect(() => { document.body.classList.toggle('light', !dark); }, []);

    /* ── entrance animation ── */
    const hdrRef  = useRef(null);
    const stgRef  = useRef(null);
    const panRef  = useRef(null);
    useEffect(() => {
      const tl = anime.timeline({ easing: 'easeOutExpo' });
      tl.add({ targets: hdrRef.current,  opacity:[0,1], translateY:[-22,0], duration:600 })
        .add({ targets: stgRef.current,  opacity:[0,1], translateY:[22,0],  duration:580 }, '-=320')
        .add({ targets: panRef.current,  opacity:[0,1], translateY:[14,0],  duration:480 }, '-=200');
    }, []);

    /* ── browser voices ── */
    function loadBvList() {
      const vv = speechSynthesis.getVoices();
      if (vv.length) setBvList(vv);
    }
    useEffect(() => {
      loadBvList();
      speechSynthesis.onvoiceschanged = loadBvList;
    }, []);
    function resolveVoice() {
      const sel = bvRef.current;
      if (sel) { const f = speechSynthesis.getVoices().find(v => v.name === sel); if (f) return f; }
      return pickBestVoice();
    }

    /* ── server voices ── */
    async function loadSvrVoices() {
      try {
        const r = await fetch(API('/voice/voices'), { headers: VOICE_HEADERS() });
        const d = await r.json();
        if (!d.ok || d.provider !== 'edge' || !d.voices?.length) return;
        setSvrVoices(d.voices); setSvrActive(d.active || ''); setShowSvr(true);
        const v = d.voices.find(x => x.voice === d.active);
        if (v) setSvrDesc(`${v.voice} · ${v.lang} · ${v.gender} · ${v.desc}`);
      } catch {}
    }
    async function changeSvrVoice(voice) {
      if (!voice) return;
      try {
        const r = await fetch(API('/voice/set-voice'), {
          method:'POST',
          headers:{ 'Content-Type':'application/json', ...VOICE_HEADERS() },
          body: JSON.stringify({ voice }),
        });
        const d = await r.json();
        if (d.ok) {
          setSvrActive(d.active); setSvrDesc(`Active: ${d.active}`);
          setTtsHint(`Voice: Microsoft Edge TTS — ${d.active} (free neural, requires internet).`);
        }
      } catch { setSvrDesc('Could not change voice — server unreachable.'); }
    }

    /* ── TTS ping ── */
    useEffect(() => {
      fetch(API('/voice/ping'), { headers: VOICE_HEADERS() })
        .then(r => r.json())
        .then(j => {
          if (!j.tts) return;
          const p = j.tts.provider;
          if (p === 'piper')  setTtsHint('Voice: Piper (local neural — free, offline).');
          else if (p === 'edge')   setTtsHint(`Voice: Microsoft Edge TTS — ${j.tts.edgeVoice || 'Aria'} (free neural, requires internet).`);
          else if (p === 'openai') setTtsHint('Voice: OpenAI TTS (paid cloud neural).');
          else setTtsHint('Voice: browser fallback — set FRIDAY_EDGE_TTS_VOICE in .env to pick a different Edge voice.');
        }).catch(() => {});
    }, []);

    /* ── speech utils ── */
    function cancelSpeech() {
      speechSynthesis.cancel();
      if (audRef.current) {
        try { audRef.current.pause(); audRef.current.removeAttribute('src'); audRef.current.load(); } catch {}
        audRef.current = null;
      }
    }
    function stopRec() {
      if (!recRef.current) return;
      try { recRef.current.stop(); } catch {}
      recRef.current = null;
    }
    function stopBarge() {
      if (!bargeRef.current) return;
      const r = bargeRef.current; bargeRef.current = null;
      try { r.onend = null; r.onresult = null; r.stop(); } catch {}
    }

    async function speakBrowser(text, id, onEnd) {
      const rv = Math.min(1.25, Math.max(0.9, rateRef.current));
      const pv = Math.min(1.2,  Math.max(0.9, pitchRef.current));
      const parts = text.match(/[^.!?\n]+[.!?]?/g) || [text];
      for (const chunk of parts) {
        if (id !== uidRef.current) return;
        const c = chunk.trim(); if (!c) continue;
        await new Promise(res => {
          const u = new SpeechSynthesisUtterance(c);
          u.rate = rv; u.pitch = pv;
          const v = resolveVoice(); if (v) u.voice = v;
          const t = setTimeout(res, Math.max(6000, c.length * 65));
          u.onend  = () => { clearTimeout(t); setTimeout(res, 70); };
          u.onerror= () => { clearTimeout(t); res(); };
          speechSynthesis.speak(u);
        });
      }
      if (id === uidRef.current) onEnd?.();
    }

    function startBarge(speakId) {
      stopBarge();
      if (!SR || !sessRef.current) return;
      let handled = false;
      const r = new SR();
      r.lang = 'en-US'; r.continuous = true; r.interimResults = true;
      r.onresult = ev => {
        if (handled || speakId !== uidRef.current) return;
        if (stateRef.current !== 'speaking') return;
        let final = '';
        for (let i = ev.resultIndex; i < ev.results.length; i++)
          if (ev.results[i].isFinal) final += ev.results[i][0].transcript;
        const said = final.trim(); if (said.length < 2) return;
        handled = true; uidRef.current++;
        cancelSpeech(); stopBarge(); stopRec();
        runCommand(said, true);
      };
      r.onerror = () => {};
      r.onend = () => {
        if (handled || speakId !== uidRef.current) return;
        if (!sessRef.current || stateRef.current !== 'speaking') return;
        bargeRef.current = r;
        try { r.start(); } catch { setTimeout(() => { if (!handled && sessRef.current && stateRef.current === 'speaking') { bargeRef.current = r; try { r.start(); } catch {} } }, 250); }
      };
      bargeRef.current = r;
      try { r.start(); } catch { bargeRef.current = null; }
    }

    async function speak(text, onEnd) {
      cancelSpeech();
      const id = ++uidRef.current;
      startBarge(id);
      const cleaned = forSpeech(text);
      let fired = false; let wd;
      const done = () => {
        if (fired) return; fired = true; clearTimeout(wd); stopBarge();
        if (id === uidRef.current) onEnd?.();
      };
      wd = setTimeout(done, 90_000);
      try {
        const r = await fetch(API('/voice/tts'), {
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'ngrok-skip-browser-warning':'69420', Accept:'audio/wav, audio/mpeg, application/json', ...voiceAuthHeaders() },
          body: JSON.stringify({ text: cleaned, voice: chatVRef.current.voice }),
          cache:'no-store',
        });
        const ct = (r.headers.get('content-type') || '').toLowerCase();
        if (r.ok && (ct.includes('audio/mpeg') || ct.includes('audio/wav'))) {
          const blob = await r.blob();
          const url  = URL.createObjectURL(blob);
          const a    = new Audio(); audRef.current = a; a.src = url;
          const cleanup = () => { URL.revokeObjectURL(url); if (audRef.current === a) audRef.current = null; };
          a.onended = () => { cleanup(); done(); };
          a.onerror = () => { cleanup(); done(); };
          a.playbackRate = Math.min(1.25, Math.max(0.9, rateRef.current));
          await a.play(); return;
        }
      } catch {}
      if (id !== uidRef.current) { done(); return; }
      await speakBrowser(cleaned, id, done);
    }

    /* ── add message with spring animation ── */
    function addMsg(role, text) {
      const id = ++msgIdRef.current;
      setMessages(prev => [...prev, { id, role, text }]);
    }
    const chatRef = useRef(null);
    useEffect(() => {
      if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
    }, [messages]);

    /* ── model body helper ── */
    function modelBody() {
      const m = model.trim();
      return m ? { claudeModel: m } : {};
    }

    /* ── run command ── */
    async function runCommand(text, fromVoice = false) {
      const t = (text || '').trim(); if (!t) return;
      if (fromVoice && sessRef.current && /^(stop|stop listening|cancel|never ?mind)\.?$/i.test(t)) {
        setHint('Okay — that was not sent. Listening again.'); startListenTurn(); return;
      }
      if (busyRef.current && stateRef.current !== 'speaking') return;
      busyRef.current = true;
      addMsg('you', t);
      stopRec(); stopBarge();
      setOrb('thinking');
      setHint(fromVoice ? 'Thinking — Claude often needs 10–30 s. Pick Haiku above for speed.' : 'Thinking — Claude often needs 10–30 s.');
      const ac = new AbortController(); abrtRef.current = ac;
      try {
        const r = await fetch(API('/voice/command'), {
          method:'POST',
          headers:{ 'Content-Type':'application/json', ...VOICE_HEADERS() },
          body: JSON.stringify({ text: t, userId:'friday-web', correlationId: crypto.randomUUID(), ...modelBody() }),
          cache:'no-store', signal: ac.signal,
        });
        const raw = await r.text();
        if (raw.trim().startsWith('<')) {
          addMsg('agent', 'Tunnel returned HTML (wrong target port or not pc-agent). Point ngrok at port 3847 and restart pc-agent.');
          speak('That did not reach Friday.', cycleAfterSpeech); return;
        }
        let j = {};
        try { j = JSON.parse(raw); } catch { j = { error: raw.slice(0, 400) || 'Bad response' }; }
        if (!r.ok) {
          addMsg('agent', [j.error, j.hint].filter(Boolean).join(' — ') || r.statusText || 'Request failed');
          speak('Sorry, that request failed.', cycleAfterSpeech); return;
        }
        const reply = typeof j.summary === 'string' ? j.summary : JSON.stringify(j);
        const replyTrim = String(reply).trim();
        if (j.deferredOpenRouter) {
          openRouterPendingRef.current = true;
          if (openRouterTimeoutRef.current) clearTimeout(openRouterTimeoutRef.current);
          openRouterTimeoutRef.current = setTimeout(() => {
            openRouterPendingRef.current = false;
            openRouterTimeoutRef.current = null;
          }, 120_000);
        }
        if (replyTrim) {
          addMsg('agent', reply);
        }
        if (j.speakAsync !== false && replyTrim) {
          setOrb('speaking'); setHint('Speak to interrupt, tap Stop, or tap the orb.');
          speak(reply, cycleAfterSpeech);
        } else {
          setOrb('listening');
          busyRef.current = false;
          setHint(sessRef.current ? 'Listening…' : 'Stand by.');
          if (sessRef.current) startListenTurn();
        }
      } catch (e) {
        if (e?.name === 'AbortError') {
          addMsg('agent', 'Stopped.'); busyRef.current = false;
          if (sessRef.current) { setHint('Listening…'); startListenTurn(); } else setOrb('idle');
          return;
        }
        addMsg('agent', String(e?.message || e));
        speak('Connection failed.', cycleAfterSpeech);
      } finally {
        if (abrtRef.current === ac) abrtRef.current = null;
      }
    }

    function cycleAfterSpeech() {
      busyRef.current = false;
      if (!sessRef.current) { setOrb('idle'); setHint('Session ended.'); return; }
      setHint('Speak when ready.'); startListenTurn();
    }

    /* Deferred OpenRouter answer arrives via SSE — do not speak the rate-limit status line above */
    useEffect(() => {
      let es;
      try {
        es = new EventSource(API('/voice/stream'));
        es.onmessage = (e) => {
          try {
            const ev = JSON.parse(e.data);
            if (!openRouterPendingRef.current) return;
            if (ev.type === 'reply' && ev.text) {
              openRouterPendingRef.current = false;
              if (openRouterTimeoutRef.current) {
                clearTimeout(openRouterTimeoutRef.current);
                openRouterTimeoutRef.current = null;
              }
              addMsg('agent', ev.text);
              setOrb('speaking');
              setHint('Speak to interrupt, tap Stop, or tap the orb.');
              busyRef.current = true;
              speak(ev.text, cycleAfterSpeech);
            } else if (ev.type === 'error' && ev.text) {
              openRouterPendingRef.current = false;
              if (openRouterTimeoutRef.current) {
                clearTimeout(openRouterTimeoutRef.current);
                openRouterTimeoutRef.current = null;
              }
              addMsg('agent', ev.text);
              setOrb('speaking');
              busyRef.current = true;
              speak('Open Router failed. Check the chat.', cycleAfterSpeech);
            }
          } catch {}
        };
      } catch {}
      return () => {
        try { es?.close(); } catch {}
      };
    }, []);

    function startListenTurn() {
      if (!sessRef.current || busyRef.current) return;
      if (!SR) { setHint('Speech recognition not available in this browser.'); setOrb('idle'); return; }
      setOrb('listening'); stopRec();
      const myTurn = ++lstnRef.current;
      let buffer = '';
      const r = new SR();
      r.lang = 'en-US'; r.continuous = false; r.interimResults = true;
      r.onresult = ev => {
        buffer = ''; let interim = '';
        for (let i = 0; i < ev.results.length; i++) {
          const t = ev.results[i][0].transcript;
          if (ev.results[i].isFinal) buffer += t; else interim += t;
        }
        const live = (buffer + interim).trim(); if (live) setHint(live);
      };
      r.onerror = e => {
        if (e.error === 'aborted' || e.error === 'no-speech') return;
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          sessRef.current = false; setActive(false); setOrb('idle');
          setHint('Mic blocked — allow microphone access in the address bar, then Begin session again.'); return;
        }
        if (e.error === 'audio-capture') { setHint('No microphone found — check your mic is connected.'); return; }
        setHint('Mic error: ' + (e.error || 'unknown'));
      };
      r.onend = () => {
        recRef.current = null;
        if (myTurn !== lstnRef.current) return;
        if (!sessRef.current || busyRef.current) return;
        const said = buffer.trim(); buffer = '';
        if (said) runCommand(said, true);
        else { setHint('Speak when ready.'); startListenTurn(); }
      };
      recRef.current = r;
      try { r.start(); } catch (e) {
        recRef.current = null; setHint(String(e?.message || e));
        if (sessRef.current) setTimeout(startListenTurn, 600);
      }
    }

    /* ── cancel / stop ── */
    function cancelAll() {
      uidRef.current++;
      cancelSpeech(); stopBarge();
      const st = stateRef.current;
      if (st === 'listening') {
        lstnRef.current++; stopRec();
        if (sessRef.current && !busyRef.current) {
          setHint('Skipped — listening again.');
          setTimeout(() => { if (sessRef.current && !busyRef.current) startListenTurn(); }, 200);
        }
        return;
      }
      stopRec();
      if (abrtRef.current) { try { abrtRef.current.abort(); } catch {} return; }
      if (st === 'speaking') {
        busyRef.current = false;
        if (sessRef.current) { setHint('Stopped. Listening…'); startListenTurn(); } else setOrb('idle');
      }
    }

    function beginSession() {
      if (!SR) { setHint('Use Chrome or Edge for speech recognition.'); return; }
      speechSynthesis.getVoices(); loadBvList(); loadSvrVoices();
      sessRef.current = true; setActive(true);
      busyRef.current = false;
      setMessages([]); cancelSpeech(); stopRec(); stopBarge();
      setHint('Listening for you…'); startListenTurn();
    }
    function endSession() {
      sessRef.current = false; setActive(false); busyRef.current = false;
      stopRec(); stopBarge(); cancelSpeech();
      setOrb('idle'); setHint('Session ended. Tap Begin when you want to continue.');
    }
    function sendTyped() {
      const t = typed.trim(); if (!t) return; setTyped('');
      if (stateRef.current === 'speaking') { uidRef.current++; cancelSpeech(); stopBarge(); busyRef.current = false; }
      stopRec(); runCommand(t, false);
    }
    function rerollVoice() {
      const v = CHAT_VOICES[Math.floor(Math.random() * CHAT_VOICES.length)];
      sessionStorage.setItem(SS_VOICE, v.voice); setChatVoice(v);
    }

    /* ── server voice grouped options ── */
    const svGroups = {};
    for (const v of svrVoices) {
      const g = v.lang.startsWith('en-GB') ? 'British' :
                v.lang.startsWith('en-US') ? 'American' :
                v.lang.startsWith('en-IN') ? 'Indian' :
                v.lang.startsWith('en-AU') ? 'Australian' :
                v.lang.startsWith('en-CA') ? 'Canadian' : 'Other';
      (svGroups[g] = svGroups[g] || []).push(v);
    }
    /* ── browser voice label helpers ── */
    const bvEn    = bvList.filter(v => /^en/i.test(v.lang));
    const bvOther = bvList.filter(v => !/^en/i.test(v.lang));
    function vLabel(v) {
      const s = v.name
        .replace(/\s+Online\s*\(Natural\)/gi,'').replace(/\s+\(Natural\)/gi,'')
        .replace(/\s+Neural\b/gi,'').replace(/Microsoft\s+/i,'MS ').trim();
      const q = /Natural|Neural|Online/i.test(v.name) ? 'Neural' : v.localService ? 'Local' : 'Online';
      return `${s}  [${v.lang} · ${q}]${v.default ? ' ★' : ''}`;
    }
    function vDesc(v) {
      if (!v) return '';
      const pp = [v.name, v.lang, v.localService ? 'Offline / local' : 'Online'];
      if (/Natural|Neural/i.test(v.name)) pp.push('neural quality');
      if (v.default) pp.push('browser default');
      return pp.join(' · ');
    }
    const selBv   = bvList.find(v => v.name === bv);
    const bvDescTxt = bv ? vDesc(selBv) : 'Friday will automatically choose the best available English voice.';

    /* ── labels ── */
    const ORB_LABELS = { idle:'Ready', listening:'Listening', thinking:'Thinking', speaking:'Speaking' };

    /* ── render ── */
    return html`
      <!-- aurora background -->
      <div className="aurora" aria-hidden="true">
        <div className="aurora-blob aurora-blob-1"></div>
        <div className="aurora-blob aurora-blob-2"></div>
        <div className="aurora-blob aurora-blob-3"></div>
        <div className="aurora-blob aurora-blob-4"></div>
        <div className="aurora-blob aurora-blob-5"></div>
      </div>
      <div className="bg-grid" aria-hidden="true"></div>

      <button className="theme-toggle" onClick=${() => setDark(!dark)} aria-label="Toggle theme">
        ${dark ? '☀ Light' : '☾ Dark'}
      </button>

      <div className="wrap">

        <!-- HEADER -->
        <header ref=${hdrRef} style=${{ opacity: 0 }}>
          <h1 className="friday-title">Friday</h1>
          <p className="subtitle">
            Two-way voice — you speak, Friday runs your PC (apps + Claude), she speaks back.
            While listening or speaking, use <strong>Stop</strong> or tap the orb to cancel.
          </p>
          ${ttsHint && html`<p className="tts-hint">${ttsHint}</p>`}

          <div className="bar-row" style=${{ marginTop:'0.45rem' }}>
            <span className="bar-label">Claude model</span>
            <select className="glass-select" value=${model} onChange=${e => setModel(e.target.value)}>
              <option value="">Server default (.env / Sonnet)</option>
              <option value="haiku">Haiku — fastest</option>
              <option value="sonnet">Sonnet — balanced</option>
              <option value="opus">Opus — strongest</option>
              <option value="openrouter-free">OpenRouter free (OPENROUTER_FREE_MODEL)</option>
              <option value="inherit">CLI default (no --model)</option>
            </select>
          </div>

          ${showSvr && html`
            <div className="bar-row" style=${{ marginTop:'0.38rem' }}>
              <span className="bar-label">Server voice</span>
              <select className="glass-select" value=${svrActive} onChange=${e => changeSvrVoice(e.target.value)}>
                ${Object.entries(svGroups).map(([grp, voices]) => html`
                  <optgroup key=${grp} label=${grp}>
                    ${voices.map(v => html`
                      <option key=${v.voice} value=${v.voice}>
                        ${v.voice.replace('Neural','').replace(/^en-\w\w-/,'')} — ${v.desc}
                      </option>
                    `)}
                  </optgroup>
                `)}
              </select>
            </div>
            ${svrDesc && html`<p className="tts-hint">${svrDesc}</p>`}
          `}

          <div className="bar-row" style=${{ marginTop:'0.32rem' }}>
            <span className="bar-label">Session voice</span>
            <span className="sv-badge" data-gender=${chatVoice.gender.toLowerCase()}>
              ${chatVoice.label}
            </span>
            <button type="button" className="sv-reroll" onClick=${rerollVoice} title="Pick a different random voice">
              ↻
            </button>
          </div>
        </header>

        <!-- STAGE -->
        <div ref=${stgRef} className="stage" style=${{ opacity: 0 }}>
          <${VoiceOrb} state=${orbState} onOrbClick=${cancelAll} onStop=${cancelAll} />

          <div className="state-label" data-state=${orbState}>
            ${ORB_LABELS[orbState] || orbState}
          </div>

          <p className="hint-text">${hint}</p>

          <div className="chat-history" ref=${chatRef} aria-live="polite">
            ${messages.map(m => html`<${MessageBubble} key=${m.id} role=${m.role} text=${m.text} />`)}
          </div>

          <div className="control-row">
            <button type="button" className="ctrl-btn primary"
              disabled=${active} onClick=${beginSession}>
              Begin session
            </button>
            <button type="button" className="ctrl-btn amber"
              disabled=${!active || orbState === 'idle'} onClick=${cancelAll}>
              Stop
            </button>
            <button type="button" className="ctrl-btn danger"
              disabled=${!active} onClick=${endSession}>
              End session
            </button>
          </div>
        </div>

        <!-- TODOS PANEL -->
        <${TodosPanel} />

        <!-- SETTINGS PANEL -->
        <div ref=${panRef} className="settings-panel" style=${{ opacity: 0 }}>
          <button type="button" className="settings-toggle-btn" onClick=${() => setPanelOpen(o => !o)}>
            <span>Type instead · voice tuning</span>
            <span className=${'settings-arrow' + (panelOpen ? ' open' : '')}>▾</span>
          </button>
          <div className=${'settings-body' + (panelOpen ? ' open' : '')}>
            <div className="settings-inner">
              <label className="field-label" htmlFor="typed-cmd">Typed command (Enter or Send)</label>
              <textarea
                id="typed-cmd"
                className="glass-textarea"
                placeholder="Open Notepad, or explain this repo…"
                value=${typed}
                onChange=${e => setTyped(e.target.value)}
                onKeyDown=${e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTyped(); } }}
              ></textarea>
              <button type="button" className="ctrl-btn primary" onClick=${sendTyped}>Send typed</button>

              <div className="range-row">
                <label className="field-label" htmlFor="rate-sl">Rate ${rate.toFixed(2)}×</label>
                <input type="range" id="rate-sl" min="0.9" max="1.25" step="0.005"
                  value=${rate} onChange=${e => setRate(+e.target.value)} />
                <label className="field-label" htmlFor="pitch-sl">Pitch ${pitch.toFixed(2)}</label>
                <input type="range" id="pitch-sl" min="0.9" max="1.2" step="0.05"
                  value=${pitch} onChange=${e => setPitch(+e.target.value)} />
              </div>

              <div className="range-row" style=${{ marginTop:'0.2rem' }}>
                <label className="field-label" htmlFor="bv-pick">Browser voice</label>
                <select id="bv-pick" className="glass-select sq"
                  value=${bv} onChange=${e => setBv(e.target.value)}>
                  <option value="">Auto-pick best voice</option>
                  ${bvEn.length > 0 ? html`
                    <optgroup label="English voices">
                      ${bvEn.map(v => html`<option key=${v.name} value=${v.name}>${vLabel(v)}</option>`)}
                    </optgroup>
                  ` : null}
                  ${bvOther.length > 0 ? html`
                    <optgroup label="Other languages">
                      ${bvOther.map(v => html`<option key=${v.name} value=${v.name}>${vLabel(v)}</option>`)}
                    </optgroup>
                  ` : null}
                </select>
              </div>
              <p className="voice-info">${bvDescTxt}</p>
            </div>
          </div>
        </div>

      </div>
    `;
  }

  const __root = document.getElementById('root');
  try {
    createRoot(__root).render(html`<${App} />`);
  } catch (err) {
    console.error('[friday-ui]', err);
    __root.innerHTML =
      '<div style="padding:2rem;font-family:system-ui,sans-serif;max-width:42rem;margin:0 auto;color:#b91c1c">' +
      '<h1 style="font-size:1.1rem;margin:0 0 0.75rem">Friday UI failed to start</h1>' +
      '<pre style="white-space:pre-wrap;word-break:break-word;font-size:11px;background:#0f172a;color:#e2e8f0;padding:1rem;border-radius:10px;overflow:auto">' +
      String((err && err.stack) || err) +
      '</pre>' +
      '<p style="color:#64748b;font-size:0.85rem;margin-top:1rem">If you see "Invalid hook call" or two Reacts, your browser blocked a CDN script — check the network tab for esm dot sh or j s deliver.</p>' +
      '</div>';
  }
  </script>
</body>
</html>
